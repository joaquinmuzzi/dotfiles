[colors]
background = #1E222A
background-alt = #262B35
foreground = #C8D3F5
primary = #82AAFF
secondary = #65BCFF
alert = #FF757F
disabled = #5B6376

[bar/bar1]
width = 100%
height = 28
radius = 8
line-size = 2

background = ${colors.background}
foreground = ${colors.foreground}

border-size = 0
border-color = ${colors.background}

padding-left = 1
padding-right = 1

module-margin = 1
fixed-center = true
wm-restack = bspwm

separator =
separator-foreground = ${colors.background}

font-0 = monospace:size=11;3
font-1 = JetBrainsMono Nerd Font:size=12;3

modules-left = xworkspaces xwindow
modules-center = date
modules-right = battery temperature cpu memory pulseaudio wlan

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-foreground = ${colors.primary}
label-active-underline = ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-foreground = ${colors.background}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
label = %{F#65BCFF}%{T2}󰖯%{T-}%{F-}  %title:0:55:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#64B5F6}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = custom/script
exec = ~/.config/polybar/volume.sh
interval = 1

format = <label>
label = %{F#82AAFF}%{T2}%{T-}%{F-}  %output%
click-left = pavucontrol

[module/memory]
type = internal/memory
interval = 5
label = %{F#82AAFF}%{T2}󰍛%{T-}%{F-}  %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 5
label = %{F#82AAFF}%{T2}%{T-}%{F-}  %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#5B6376}%{T2}󰤮%{T-}%{F-}  disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#82AAFF}%{T2}%{T-}%{F-}  %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#82AAFF}%{T2}󰈀%{T-}%{F-}  %local_ip%

[module/date]
type = internal/date
interval = 1

date = %d/%m/%Y · %H:%M

label = %{F#65BCFF}%{T2}%{T-}%{F-}  %date%
label-foreground = ${colors.secondary}

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC
full-at = 98

time-format = %H:%M

format-charging = <label-charging>
format-discharging = <label-discharging>
format-full = <label-full>

label-charging = %{F#82AAFF}%{T2}%{T-}%{F-}  %percentage%%
label-discharging = %{F#82AAFF}%{T2}%{T-}%{F-}  %percentage%% (%time%)
label-low = %{F#FF757F}%{T2}%{T-}%{F-}  LOW BAT %percentage%%
label-full = %{F#82AAFF}%{T2}%{T-}%{F-}  FULL

[module/temperature]
type = internal/temperature

interval = 5
format = <label>
label = %{F#82AAFF}%{T2}%{T-}%{F-}  %temperature-c%
format-warn = <label-warn>
label-warn = %{F#FF757F}%{T2}%{T-}%{F-}  %temperature-c%

thermal-zone = 0
zone-type = x86_pkg_temp
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon2/temp1_input
base-temperature = 0
warn-temperature = 80

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
